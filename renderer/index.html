<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Brittain Code</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header id="topbar">
    <span class="brand">BRITTAIN CODE</span>
    <select id="model-select" title="Model"></select>
    <button id="cwd-btn" title="Choose working directory">DIR: <span id="cwd-label">not set</span></button>
    <button id="history-btn" title="Show/hide chat history">HISTORY</button>
    <span class="spacer"></span>
    <label class="toggle" title="Ask models that support it to reason before answering (slower, shows thinking)">
      <input type="checkbox" id="think-toggle" />
      <span>THINK</span>
    </label>
    <label class="toggle" title="When on, file writes and shell commands run without asking">
      <input type="checkbox" id="auto-approve" />
      <span>AUTO-APPROVE</span>
    </label>
    <button id="new-btn" title="Clear conversation">NEW SESSION</button>
  </header>

  <div id="main-row">
    <aside id="sidebar" class="hidden">
      <div id="sidebar-head">CHATS</div>
      <div id="chat-list"></div>
    </aside>
    <main id="chat"></main>
    <!-- Startup message overlay — lives outside #chat so chat.innerHTML wipes can't destroy it -->
    <div id="startup-message" class="hidden">
      <div id="startup-message-content"></div>
    </div>
  </div>

  <div id="approval-bar" class="hidden">
    <div class="approval-text">
      <span class="approval-tool" id="approval-tool"></span>
      <pre id="approval-detail"></pre>
    </div>
    <div class="approval-actions">
      <button id="approve-btn" class="approve">APPROVE</button>
      <button id="deny-btn" class="deny">DENY</button>
    </div>
  </div>

  <div id="question-bar" class="hidden">
    <div id="question-cards"></div>
    <div id="question-submit-row">
      <button id="question-submit" disabled>SUBMIT ANSWERS</button>
    </div>
  </div>

  <footer>
    <div id="img-preview" class="hidden"></div>
    <div id="input-row">
      <textarea id="input" rows="3" placeholder="Describe a task... (Enter to send, Shift+Enter for newline)"></textarea>
      <button id="img-btn" title="Attach an image (or paste one into the text box)">IMG</button>
      <input type="file" id="img-file" accept="image/png,image/jpeg,image/webp,image/gif" multiple class="hidden" />
      <button id="send-btn">SEND</button>
      <button id="stop-btn" class="hidden">STOP</button>
    </div>
    <div id="statusbar">
      <span id="status-state">idle</span>
      <span class="sep">|</span>
      <span>context: <span id="ctx-tokens">0</span> / <span id="ctx-limit">?</span> tok</span>
      <span class="ctx-bar"><span id="ctx-fill"></span></span>
      <span class="sep">|</span>
      <span>elapsed: <span id="elapsed">0.0s</span></span>
      <span class="sep">|</span>
      <span>tools used: <span id="tool-count">0</span></span>
    </div>
  </footer>

  <script src="vendor/marked.js"></script>
  <script src="vendor/purify.js"></script>
  <script src="app.js"></script>
</body>
</html>
